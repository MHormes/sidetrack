<!--
  Sidetrack – Email Signature
  ───────────────────────────────────────────────────────────
  Copy everything between the <body> tags into your email
  client's HTML signature editor.

  Images load from https://sidetracksounds.nl — they appear
  when the recipient has internet and hasn't blocked remote
  images.

  Icon compatibility: inline SVGs work in Gmail, Apple Mail,
  and Thunderbird. Outlook (Windows) does not render SVGs —
  swap them for linked PNG images if needed.
  ───────────────────────────────────────────────────────────
-->
<!DOCTYPE html>
<html lang="nl">
<head><meta charset="UTF-8"></head>
<body>

<table cellpadding="0" cellspacing="0" style="font-family:Arial,Helvetica,sans-serif;max-width:480px;">

  <!-- ── Warm closing ───────────────────────────────────── -->
  <tr>
    <td style="padding-bottom:14px;">
      <p style="margin:0;font-size:14px;font-weight:700;color:#1a1917;">Groetjes Sidetrack,</p>
      <p style="margin:0;font-size:13px;color:#9a948e;">Lisa, Sten, Maarten en Max</p>
    </td>
  </tr>

  <!-- ── Main row: illustration left, contact right ─────── -->
  <tr>
    <td>
      <table cellpadding="0" cellspacing="0">
        <tr>

          <!-- Band illustration -->
          <td style="vertical-align:top;padding-right:18px;width:100px;">
            <a href="https://sidetracksounds.nl">
              <img
                src="https://sidetracksounds.nl/images/logo/fineline_zwart.png"
                alt="Sidetrack"
                width="100"
                style="display:block;border:0;"
              />
            </a>
          </td>

          <!-- Contact block -->
          <td style="vertical-align:middle;border-left:3px solid #b87058;padding-left:16px;">

            <!-- Email -->
            <table cellpadding="0" cellspacing="0" style="margin-bottom:6px;">
              <tr>
                <td style="vertical-align:middle;padding-right:7px;">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#b87058" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="4" width="20" height="16" rx="2"/>
                    <path d="M2 7l10 7 10-7"/>
                  </svg>
                </td>
                <td style="vertical-align:middle;">
                  <a href="mailto:info@sidetracksounds.nl" style="font-size:13px;color:#b87058;text-decoration:none;font-weight:600;">info@sidetracksounds.nl</a>
                </td>
              </tr>
            </table>

            <!-- Instagram -->
            <table cellpadding="0" cellspacing="0" style="margin-bottom:6px;">
              <tr>
                <td style="vertical-align:middle;padding-right:7px;">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="#6b6760">
                    <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
                  </svg>
                </td>
                <td style="vertical-align:middle;">
                  <a href="https://www.instagram.com/sidetrack.sounds/" style="font-size:13px;color:#6b6760;text-decoration:none;">@sidetrack.sounds</a>
                </td>
              </tr>
            </table>

            <!-- Facebook -->
            <table cellpadding="0" cellspacing="0" style="margin-bottom:14px;">
              <tr>
                <td style="vertical-align:middle;padding-right:7px;">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="#6b6760">
                    <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                  </svg>
                </td>
                <td style="vertical-align:middle;">
                  <a href="https://www.facebook.com/people/sidetracksounds/61579899760309/" style="font-size:13px;color:#6b6760;text-decoration:none;">Sidetrack</a>
                </td>
              </tr>
            </table>

            <!-- Website -->
            <p style="margin:0;font-size:12px;">
              <a href="https://sidetracksounds.nl" style="color:#9a948e;text-decoration:none;">sidetracksounds.nl</a>
            </p>

          </td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- ── Logo badge ─────────────────────────────────────── -->
  <tr>
    <td style="padding-top:14px;">
      <a href="https://sidetracksounds.nl">
        <img
          src="https://sidetracksounds.nl/images/logo/logo.png"
          alt="Sidetrack"
          height="60"
          style="display:block;border:0;"
        />
      </a>
    </td>
  </tr>

</table>

</body>
</html>
